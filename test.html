<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Document</title>
</head>
<style>
    body{
        background:black;
    }
    span{
        color:rgb(219, 148, 15);
    }
   
    #box{
        width:250px;
        height:200px;
        margin: auto;border-radius:15px;
        background:rgb(42, 42, 98); margin-top:150px;
    }
  #res{
    margin:20px auto;
    background:green;
    border:none;
    width:150px;
    height:35px;border-radius:5px;
    display: block;margin: auto;
   }
    #give{
    margin:20px auto;
    background:rgb(162, 162, 41);
    border:none;
    width:150px;
    height:35px;border-radius:5px;
    display: block;margin: auto;
   }
   #icon{
    display: flex;
   }
   .fa-shop,
   .fa-link,
   .fa-share{
    color:white;
    font-size:30px;
    margin-left:18%;
   }
   #number{
    color:white;text-align: center;  font-size: 55px; 
   }
   
</style>
<body>
    <span onclick="window.location.href='frofile.html'";><i class="fa-solid fa-angle-left"></i>HOME </span><br>
    <div id="box">
        <p id="number"> 0 <br> Count</p> 
        
    </div><br>
    <button onclick="window.location.href='Shop.html'" id="give"> GIVE </button><br>
 <button onclick="window.location.href='index.html'" id="res"> RESTART </button><br><br><br>
<div id="icon"> 
 <i class="fa-solid fa-shop" onclick="window.location.href='Shop.html'"></i> <i class="fa-solid fa-link"></i> <i class="fa-solid fa-share" onclick="sharePage()"></i>
</div>


<script>
function sharePage(){
  if(navigator.share){
    navigator.share({
      title: "My Game",
      text: "Play my game!",
      url: window.location.href
    });
  }else{
    alert("Share not supported in this browser");
  }
}
</script>
</body>
</html>
